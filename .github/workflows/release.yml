name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: cli-assistant-x86_64-linux-gnu.tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: cli-assistant-aarch64-linux-gnu.tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Configure linker for aarch64
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          mkdir -p .cargo
          cat >> .cargo/config.toml << 'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          mkdir -p package/cli-assistant/bin
          mkdir -p package/cli-assistant/config
          mkdir -p package/cli-assistant/scripts

          # Binaries
          cp target/${{ matrix.target }}/release/c      package/cli-assistant/bin/
          cp target/${{ matrix.target }}/release/clad    package/cli-assistant/bin/

          # Config template
          cp config/config.toml           package/cli-assistant/config/
          cp config/com.cli-assistant.conf package/cli-assistant/config/
          cp config/clad.service          package/cli-assistant/config/

          # Install scripts
          cp scripts/install.sh           package/cli-assistant/
          cp scripts/uninstall.sh         package/cli-assistant/

          # License & docs
          cp LICENSE README.md            package/cli-assistant/

          cd package
          tar czf ../${{ matrix.archive }} cli-assistant/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: "*.tar.gz"
